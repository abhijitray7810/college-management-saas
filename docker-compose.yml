###############################################################################
# College Management SaaS — Docker Compose
# Usage:
#   Dev:  docker compose up --build
#   Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
###############################################################################

version: "3.9"

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-college_mgmt}
      POSTGRES_USER:     ${POSTGRES_USER:-college_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-college_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"   # expose only in dev; remove in prod overlay

  # ── Redis (session cache / rate-limit store) ────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB Migrations (init container pattern) ──────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.server
      target: builder        # uses builder stage which has drizzle-kit
    command: ["npx", "drizzle-kit", "push:pg"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-college_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-college_mgmt}
      NODE_ENV: production
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Backend API ─────────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment:
      NODE_ENV:           ${NODE_ENV:-development}
      PORT:               3000
      DATABASE_URL:       postgresql://${POSTGRES_USER:-college_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-college_mgmt}
      JWT_SECRET:         ${JWT_SECRET:?required}
      JWT_EXPIRES_IN:     ${JWT_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      REDIS_URL:          redis://:${REDIS_PASSWORD}@redis:6379
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Frontend (Nginx) ────────────────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/app.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro         # mount certs in prod
    networks:
      - frontend
      - backend
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
