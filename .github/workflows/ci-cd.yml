###############################################################################
# .github/workflows/ci-cd.yml
# Triggers:
#   - PR → main/develop : CI only (lint, test, build)
#   - Push to main       : CI + Deploy to Production
#   - Push to develop    : CI + Deploy to Staging
###############################################################################
name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY:    ghcr.io/${{ github.repository_owner }}
  NODE_VERSION: "20"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Type-check
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Lint client
        run: npm run lint
        working-directory: client

      - name: Type-check client
        run: npx tsc --noEmit
        working-directory: client

      - name: Install server deps
        run: npm ci
        working-directory: server

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Unit & Integration Tests
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       college_test
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install & test client
        working-directory: client
        run: |
          npm ci
          npm test

      - name: Install & test server
        working-directory: server
        env:
          NODE_ENV:     test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/college_test
          JWT_SECRET:   test-jwt-secret-at-least-32-characters-long
          REDIS_URL:    redis://localhost:6379
        run: |
          npm ci
          # Run migrations then tests
          npx drizzle-kit push:pg
          npm test --if-present

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build & Push Docker images
  # ───────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages:  write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/college-server
            ${{ env.REGISTRY }}/college-client
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    Dockerfile.server
          push:    true
          tags:    ${{ env.REGISTRY }}/college-server:${{ steps.meta.outputs.version }},${{ env.REGISTRY }}/college-server:latest
          cache-from: type=gha,scope=server
          cache-to:   type=gha,mode=max,scope=server
          labels:  ${{ steps.meta.outputs.labels }}

      - name: Build & push client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    Dockerfile.client
          push:    true
          tags:    ${{ env.REGISTRY }}/college-client:${{ steps.meta.outputs.version }},${{ env.REGISTRY }}/college-client:latest
          cache-from: type=gha,scope=client
          cache-to:   type=gha,mode=max,scope=client
          labels:  ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ github.ref == 'refs/heads/main' && 'https://api.college.example.com/api' || 'https://staging-api.college.example.com/api' }}

      - name: Run Trivy vulnerability scan (server)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/college-server:${{ steps.meta.outputs.version }}
          format:    sarif
          output:    trivy-server.sarif
          severity:  CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-server.sarif

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4a — Deploy to Staging (develop branch)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.college.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Run DB migration job
        run: |
          IMAGE_TAG=${{ needs.build-push.outputs.image-tag }}
          REGISTRY=${{ env.REGISTRY }}
          # Substitute variables and apply
          envsubst < k8s/05-migrate-job.yaml | kubectl apply -f -
          kubectl wait --for=condition=complete job/db-migrate \
            -n college-mgmt --timeout=120s

      - name: Deploy to staging
        run: |
          IMAGE_TAG=${{ needs.build-push.outputs.image-tag }}
          REGISTRY=${{ env.REGISTRY }}
          envsubst < k8s/06-server.yaml | kubectl apply -f -
          envsubst < k8s/07-client.yaml | kubectl apply -f -
          kubectl rollout status deployment/college-server -n college-mgmt --timeout=300s
          kubectl rollout status deployment/college-client -n college-mgmt --timeout=120s

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4b — Deploy to Production (main branch, with approval gate)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production          # <-- requires manual approval in GitHub UI
      url: https://college.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Run DB migration job
        run: |
          IMAGE_TAG=${{ needs.build-push.outputs.image-tag }}
          REGISTRY=${{ env.REGISTRY }}
          envsubst < k8s/05-migrate-job.yaml | kubectl apply -f -
          kubectl wait --for=condition=complete job/db-migrate \
            -n college-mgmt --timeout=120s

      - name: Rolling deploy
        run: |
          IMAGE_TAG=${{ needs.build-push.outputs.image-tag }}
          REGISTRY=${{ env.REGISTRY }}
          envsubst < k8s/06-server.yaml | kubectl apply -f -
          envsubst < k8s/07-client.yaml | kubectl apply -f -
          kubectl rollout status deployment/college-server -n college-mgmt --timeout=300s
          kubectl rollout status deployment/college-client -n college-mgmt --timeout=120s

      - name: Smoke test production
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.college.example.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: HTTP $STATUS"
            # Auto-rollback
            kubectl rollout undo deployment/college-server -n college-mgmt
            kubectl rollout undo deployment/college-client -n college-mgmt
            exit 1
          fi
          echo "Smoke test passed: HTTP $STATUS"

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *College Management* deployed to Production\nVersion: `${{ needs.build-push.outputs.image-tag }}`\nBy: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *College Management* production deployment FAILED\nVersion: `${{ needs.build-push.outputs.image-tag }}`\nBy: ${{ github.actor }}\nRollback initiated."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}