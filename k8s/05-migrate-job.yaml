###############################################################################
# k8s/05-migrate-job.yaml
# Runs drizzle-kit push before each server deployment.
# Triggered via kubectl apply in CI after image push.
###############################################################################
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: college-mgmt
  labels:
    app: db-migrate
  annotations:
    # Auto-delete after 1 hour
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for postgres..."; sleep 2;
              done
      containers:
        - name: migrate
          image: ${REGISTRY}/college-server:${IMAGE_TAG}
          command: ["npx", "drizzle-kit", "push:pg"]
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: college-server-secrets
                  key: DATABASE_URL
