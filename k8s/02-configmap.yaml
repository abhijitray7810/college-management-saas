###############################################################################
# k8s/02-configmap.yaml
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: college-server-config
  namespace: college-mgmt
data:
  NODE_ENV:           "production"
  PORT:               "3000"
  JWT_EXPIRES_IN:     "7d"
  BCRYPT_SALT_ROUNDS: "12"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: college-client-config
  namespace: college-mgmt
data:
  VITE_API_URL: "https://api.college.example.com/api"
