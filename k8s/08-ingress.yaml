###############################################################################
# k8s/08-ingress.yaml
# Requires: nginx-ingress-controller + cert-manager (Let's Encrypt)
###############################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: college-ingress
  namespace: college-mgmt
  annotations:
    kubernetes.io/ingress.class:                   "nginx"
    cert-manager.io/cluster-issuer:                "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect:       "true"
    nginx.ingress.kubernetes.io/proxy-body-size:    "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Rate limiting at ingress layer
    nginx.ingress.kubernetes.io/limit-rps:          "20"
    nginx.ingress.kubernetes.io/limit-connections:  "10"
spec:
  tls:
    - hosts:
        - college.example.com
        - api.college.example.com
      secretName: college-tls
  rules:
    # Frontend
    - host: college.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: college-client
                port:
                  number: 80
    # Backend API
    - host: api.college.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: college-server
                port:
                  number: 3000

---
# cert-manager ClusterIssuer (Let's Encrypt)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@college.example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
