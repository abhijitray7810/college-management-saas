###############################################################################
# k8s/01-secrets.yaml
# DO NOT commit real values. Use Sealed Secrets / External Secrets Operator.
# This is a template — values are base64(value) placeholders.
###############################################################################
apiVersion: v1
kind: Secret
metadata:
  name: college-server-secrets
  namespace: college-mgmt
  labels:
    app: college-server
type: Opaque
data:
  # echo -n "your-value" | base64
  DATABASE_URL:         <BASE64_DATABASE_URL>
  JWT_SECRET:           <BASE64_JWT_SECRET>
  REDIS_PASSWORD:       <BASE64_REDIS_PASSWORD>
  POSTGRES_PASSWORD:    <BASE64_POSTGRES_PASSWORD>
